name: Update Browserslist database

on:
  workflow_call:
    secrets:
      gh_token:
        required: true
    inputs:
      ruby: # some projects, like Ariadne, require Ruby to be set up
        description: "Set up Ruby environment"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-browserslist-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}

      - uses: gjtorikian/actions/setup-languages@main
        with:
          ruby: ${{ inputs.ruby }}
          node: true

      - run: npx update-browserslist-db@latest

      - name: Check for modified files
        id: git-check
        run: echo modified=$(if git diff-index --quiet HEAD --; then echo "false"; else echo "true"; fi) >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.modified == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.gh_token }}
          commit-message: "[auto-browserslist] Update Browserslist db"
          title: "[auto-browserslist] Update Browserslist db"
          body: |
            - Update Browserslist information
            Auto-generated by [create-pull-request](https://github.com/peter-evans/create-pull-request)
          branch: browserslist-update
          committer: gjtorikian-bot <246872175+gjtorikian-bot@users.noreply.github.com>
          author: gjtorikian-bot <246872175+gjtorikian-bot@users.noreply.github.com>
          delete-branch: true
          labels: "chore, github action"

      - name: Enable Pull Request Automerge
        if: steps.git-check.outputs.modified == 'true'
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          token: ${{ secrets.gh_token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}

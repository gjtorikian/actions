---
name: Runs a Vitest test suite

on:
  workflow_call:
    secrets:
      gh_token:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on:
      labels: Ubuntu-TestRunner
    timeout-minutes: 10

    steps:
      - if: ${{ contains(github.event.head_commit.message, '[skip test]') }}
        name: Skip test
        shell: bash
        run: |
          echo "Skipping test workflow because commit message contains `[skip test]`"
          exit 0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.gh_token }}

      - uses: gjtorikian/actions/setup-languages@main
        with:
          node: true

      - name: Run tests
        timeout-minutes: 10
        id: run-tests
        shell: bash
        run: |
          npm run test

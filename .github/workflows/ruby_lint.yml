name: Lint
on:
  workflow_call:
    secrets:
      gh_token:
        required: true
    inputs:
      additional_commands:
        description: "Any additional commands to run"
        required: false
        default: ""
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.gh_token }}

      - name: Set up Ruby
        uses: gjtorikian/actions/setup-languages/ruby@main

      - name: Rubocop
        run: bundle exec rubocop -A

      - name: Run additional commands
        if: ${{ inputs.additional_commands != '' }}
        run: ${{ inputs.additional_commands }}

      - name: Commit linted files
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "[auto-lint]: Lint files"

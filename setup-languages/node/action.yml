---
name: "Sets up Node's needs"
description: "Based on the provided inputs, sets up the Node environment dependencies"
inputs:
  node-version:
    description: "Node version to use"
    default: "24"

runs:
  using: "composite"
  steps:
    - name: Install Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install npm dependencies
      shell: bash
      run: |
        npm ci
